name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_basename: RecordManagementSystem-linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            asset_basename: RecordManagementSystem-windows-x86_64
            archive_ext: zip
          - os: macos-latest
            asset_basename: RecordManagementSystem-macos
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller RecordManagementSystem.spec

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czvf "../${{ matrix.asset_basename }}.${{ matrix.archive_ext }}" RecordManagementSystem

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/RecordManagementSystem -DestinationPath "${{ matrix.asset_basename }}.${{ matrix.archive_ext }}"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r "../${{ matrix.asset_basename }}.${{ matrix.archive_ext }}" RecordManagementSystem.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_basename }}
          path: ${{ matrix.asset_basename }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
